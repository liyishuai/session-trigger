name: Claude

on:
  schedule:
    - cron: 0 * * * *
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Trigger Claude
        id: claude
        uses: anthropics/claude-code-base-action@beta
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: 1+1
          max_turns: 1
          system_prompt: Result only
          model: haiku
      - name: Update README on failure
        if: steps.claude.outcome == 'failure'
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -e
          if [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
            RESULT=$(jq -r 'if type == "array" then .[] else . end | select(.type == "result") | .result // empty' "$EXECUTION_FILE" | tail -1)
            if [ -n "$RESULT" ]; then
              # Parse markdown line: * [![text](badge.svg)](link) [optional status]
              # Match the badge part and replace the entire line with badge + new status
              sed -i "s|^\(\* \[!\[[^]]*\]([^)]*workflows/claude\.yml/badge\.svg)\]([^)]*)\).*$|\1 $RESULT|" README.md
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add README.md
              if ! git diff --staged --quiet; then
                git pull --rebase
                git commit -m "Update README with Claude failure result"
                git push
              fi
            fi
          else
            echo "EXECUTION_FILE is not set or does not exist; skipping README update."
          fi
      - name: Clear README on success
        if: steps.claude.outcome == 'success'
        run: |
          set -e
          # Parse markdown line and remove status if present
          # Match: * [![text](badge.svg)](link) status
          # Replace with: * [![text](badge.svg)](link)
          if grep -q "workflows/claude\.yml/badge\.svg) " README.md; then
            sed -i "s|^\(\* \[!\[[^]]*\]([^)]*workflows/claude\.yml/badge\.svg)\]([^)]*)\) .*$|\1|" README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            if ! git diff --staged --quiet; then
              git pull --rebase
              git commit -m "Clear Claude failure result from README"
              git push
            fi
          fi