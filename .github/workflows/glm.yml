name: GLM

on:
  schedule:
    - cron: 0 * * * *
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      # Note: This step requires jq to be installed (pre-installed on GitHub-hosted runners)
      - name: Trigger GLM
        id: glm
        run: |
          # Run curl and capture both output and exit code
          response=$(curl -f -s "https://open.bigmodel.cn/api/coding/paas/v4/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.ZHIPU_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "glm-4.5-air",
              "max_tokens": 1,
              "messages": [
                {
                  "role": "user",
                  "content": "1+1"
                }
              ]
            }' 2>&1)
          curl_exit_code=$?

          echo "$response" | jq . || true

          # Store curl exit code and response for next steps
          echo "CURL_EXIT_CODE=$curl_exit_code" >> $GITHUB_ENV

          # If curl failed, parse error information
          if [ $curl_exit_code -ne 0 ]; then
            error_code=$(echo "$response" | jq -r '.error.code // empty' 2>/dev/null || echo "")
            error_msg=$(echo "$response" | jq -r '.error.message // empty' 2>/dev/null || echo "")

            echo "GLM_ERROR=$error_code" >> $GITHUB_ENV
            echo "GLM_ERROR_MSG=$error_msg" >> $GITHUB_ENV
            echo "GLM_RESPONSE=$response" >> $GITHUB_ENV
          fi
      - name: Handle non-1308 errors
        if: env.CURL_EXIT_CODE != '0' && env.GLM_ERROR != '1308'
        run: |
          echo "curl failed with exit code $CURL_EXIT_CODE"
          echo "Error code: $GLM_ERROR"
          echo "Response: $GLM_RESPONSE"
          exit $CURL_EXIT_CODE
      - name: Update README on error 1308
        if: env.GLM_ERROR == '1308'
        run: |
          set -e
          # Update table row: | ![GLM](badge.svg) | âś… | | -> | ![GLM](badge.svg) | âťŚ | error |
          sed -i 's#^| !\[GLM\]([^)]*workflows/glm\.yml/badge\.svg) |[^|]*|[^|]*|$#| ![GLM](https://github.com/liyishuai/session-trigger/actions/workflows/glm.yml/badge.svg) | âťŚ | '"$GLM_ERROR_MSG"' |#' README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git pull --rebase
            git commit -m "Update README with GLM error 1308"
            git push
          fi
      - name: Clear README on success
        if: env.CURL_EXIT_CODE == '0'
        run: |
          set -e
          # Update table row: | ![GLM](badge.svg) | âťŚ | error | -> | ![GLM](badge.svg) | âś… | |
          if grep -q "workflows/glm\.yml/badge\.svg) | âťŚ" README.md; then
            sed -i 's#^| !\[GLM\]([^)]*workflows/glm\.yml/badge\.svg) | âťŚ |[^|]*|$#| ![GLM](https://github.com/liyishuai/session-trigger/actions/workflows/glm.yml/badge.svg) | âś… | |#' README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            if ! git diff --staged --quiet; then
              git pull --rebase
              git commit -m "Clear GLM error from README"
              git push
            fi
          fi