name: GLM

on:
  schedule:
    - cron: 0 * * * *
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      # Note: This step requires jq to be installed (pre-installed on GitHub-hosted runners)
      - name: Trigger GLM
        id: glm
        continue-on-error: true
        run: |
          # Run curl and capture both output and exit code
          response=$(curl -f -s "https://open.bigmodel.cn/api/coding/paas/v4/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.ZHIPU_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "glm-4.5-air",
              "max_tokens": 1,
              "messages": [
                {
                  "role": "user",
                  "content": "1+1"
                }
              ]
            }' 2>&1)
          curl_exit_code=$?

          echo "$response" | jq . || true

          # Parse error code from response
          error_code=$(echo "$response" | jq -r '.error.code // empty' 2>/dev/null || echo "")

          # If curl failed with non-zero exit code
          if [ $curl_exit_code -ne 0 ]; then
            # If error code is 1308, handle it specially
            if [ "$error_code" = "1308" ]; then
              echo "GLM_ERROR=1308" >> $GITHUB_ENV
              echo "GLM_ERROR_MSG=$(echo "$response" | jq -r '.error.message' 2>/dev/null)" >> $GITHUB_ENV
              exit 1
            else
              # For any other error, fail with curl's exit code
              echo "curl failed with exit code $curl_exit_code"
              echo "$response"
              exit $curl_exit_code
            fi
          fi

          # If curl succeeded but response contains error code
          if [ -n "$error_code" ]; then
            if [ "$error_code" = "1308" ]; then
              echo "GLM_ERROR=1308" >> $GITHUB_ENV
              echo "GLM_ERROR_MSG=$(echo "$response" | jq -r '.error.message')" >> $GITHUB_ENV
              exit 1
            else
              echo "GLM_ERROR=$error_code" >> $GITHUB_ENV
              echo "GLM_ERROR_MSG=$(echo "$response" | jq -r '.error.message')" >> $GITHUB_ENV
              exit 1
            fi
          fi
      - name: Update README on error 1308
        if: steps.glm.outcome == 'failure' && env.GLM_ERROR == '1308'
        run: |
          set -e
          # Update table row: | ![GLM](badge.svg) | ✅ | | -> | ![GLM](badge.svg) | ❌ | error |
          sed -i 's#^| !\[GLM\]([^)]*workflows/glm\.yml/badge\.svg) |[^|]*|[^|]*|$#| ![GLM](https://github.com/liyishuai/session-trigger/actions/workflows/glm.yml/badge.svg) | ❌ | '"$GLM_ERROR_MSG"' |#' README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git pull --rebase
            git commit -m "Update README with GLM error 1308"
            git push
          fi
      - name: Clear README on success
        if: steps.glm.outcome == 'success'
        run: |
          set -e
          # Update table row: | ![GLM](badge.svg) | ❌ | error | -> | ![GLM](badge.svg) | ✅ | |
          if grep -q "workflows/glm\.yml/badge\.svg) | ❌" README.md; then
            sed -i 's#^| !\[GLM\]([^)]*workflows/glm\.yml/badge\.svg) | ❌ |[^|]*|$#| ![GLM](https://github.com/liyishuai/session-trigger/actions/workflows/glm.yml/badge.svg) | ✅ | |#' README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            if ! git diff --staged --quiet; then
              git pull --rebase
              git commit -m "Clear GLM error from README"
              git push
            fi
          fi